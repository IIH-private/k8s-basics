apiVersion: v1
kind: Pod
metadata:
  name: manual-pod
spec:
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c", "echo STATIC >> /data/file.txt && sleep 3600"]
      volumeMounts:
        - name: storage
          mountPath: /data
  volumes:
    - name: storage
      persistentVolumeClaim:
        claimName: manual-pvc
