apiVersion: v1
kind: Pod
metadata:
  name: configmap-volume-demo
spec:
   containers:
     - name: app
       image: busybox:1.36
       command: ["sh", "-c", "while true; do cat /config/mode; echo; sleep 5; done"]
       volumeMounts:
         - name: config-volume 
           mountPath: /config 
   volumes:
     - name: config-volume 
       configMap:
         name: app-config        