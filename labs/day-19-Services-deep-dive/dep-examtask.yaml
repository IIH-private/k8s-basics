apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
   metadata:
     labels: 
       app: api
   spec: 
     containers:
     - name: nginx
       image: nginx
       ports:
       - containerPort: 80
       readinessProbe:
          httpGet:
             path: /          
             port: 80
          initialDelaySeconds: 2
          periodSeconds: 5
             

