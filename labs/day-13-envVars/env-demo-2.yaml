apiVersion: v1
kind: Pod
metadata:
  name: env-demo-2
spec:
  containers:
    - name: app 
      image: busybox
      command: ["sh", "-c", "env && sleep 3600"]
      env:
        - name: APP_ENV
          value: production
        - name: APP_VERSION
          value: "1.0"
        - name: LOG_LEVEL
          value: debug        
  