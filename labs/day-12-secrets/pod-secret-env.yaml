apiVersion: v1
kind: Pod
metadata:
  name: secret-env-pod 
spec:
  containers:
    - name: demo
      image: nginx
      env:
        - name: USERNAME
          valueFrom:
            secretKeyRef:
              name: demo-secret 
              key: username 
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: demo-secret 
              key: password               