apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx # MUST match Deployment labels
  ports:
    - protocol: TCP
      port: 80 # Service port    
      targetPort: 80 # Pod port
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service-2
spec:
  selector:
    app: nginx2
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP      