apiVersion: v1
kind: Pod
metadata:
  name: volume-demo-pod
spec:
  containers:
    - name: volume-demo 
      image: busybox
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: config-volume 
          mountPath: /etc/config 
  volumes:
    - name: config-volume
      configMap:
        name: file-configmap  
    
  