apiVersion: v1
kind: Pod
metadata:
  name: env-demo-pod 
spec:
  containers:
    - name: env-demo 
      image: busybox
      command: ["sh", "-c", "env && sleep 3600"]   
      env:
        - name: APP_COLOR      
          valueFrom:
            configMapKeyRef:
              name: api-config 
              key: APP_COLOR
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_ENV               